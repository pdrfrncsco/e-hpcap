name: hpcapp
description: "Hinário Povo Cantai da Igreja Metodista Unida em Angola"
publish_to: 'none'
version: 0.0.2+21

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Estado ──────────────────────────────────────────────────────────────
  # IMPORTANTE: Riverpod fixado em 2.x — NÃO usar 'any'.
  # O build_runner gera código com base na versão instalada.
  # Uma mudança de major version quebra todos os .g.dart e .freezed.dart.
  flutter_riverpod:    ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navegação ────────────────────────────────────────────────────────────
  go_router: ^14.6.3

  # ── Rede ─────────────────────────────────────────────────────────────────
  dio: ^5.9.2
  flutter_secure_storage: ^9.2.4

  # ── Modelos (code generation) ─────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation:    ^4.9.0

  # ── UI ───────────────────────────────────────────────────────────────────
  google_fonts:        ^6.2.1
  lottie:              ^3.3.1
  cached_network_image: ^3.4.1
  shimmer:             ^3.0.0
  image_picker:        ^1.1.2
  google_mobile_ads:    ^5.2.0

  # ── Localização e Mapas ──────────────────────────────────────────────────
  geolocator:  ^13.0.4
  flutter_map: ^7.0.2
  latlong2:    ^0.9.1

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1

  # ── Utilitários ──────────────────────────────────────────────────────────
  url_launcher:     ^6.3.1
  shared_preferences: ^2.3.5
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  drift_dev: ^2.20.0

  # ── Code generation ───────────────────────────────────────────────────────
  # Fixados em versões compatíveis com Riverpod 2.x e Dart 3.x
  build_runner:      ^2.4.13
  riverpod_generator: ^2.6.1
  freezed:           ^2.5.8
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
